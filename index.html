        /* Custom scrollbar to match TradingView aesthetics */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

            background: #1e1e1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {

        }
        /* Hide scrollbar utility */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;

        }
